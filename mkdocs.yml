site_name: Prism
site_description: Prism lets AI see through IRIS — MCP server for SQL, documents, compilation, debugging, testing, and ObjectScript execution
site_url: https://adriaerni.github.io/Prism/
repo_url: https://github.com/AdriaERNI/Prism
repo_name: AdriaERNI/Prism
copyright: Copyright © 2026 Adria Sanchez. All rights reserved.
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - content.tabs.link
    - content.tooltips
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/logo.svg
  favicon: assets/logo.svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/AdriaERNI/Prism
  generator: false

plugins:
  - search:
      lang: en
      separator: '[\s\-\.]+'
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quick-start.md
    - Configuration: getting-started/configuration.md
  - Commands:
    - Overview: commands/index.md
    - prism config: commands/config.md
    - prism info: commands/info.md
    - prism sql: commands/sql.md
    - Documents: commands/documents.md
    - prism compile: commands/compile.md
    - Terminal: commands/terminal.md
    - Testing: commands/testing.md
    - prism serve: commands/serve.md
  - Testing: testing.md
  - MCP Server:
    - Overview: mcp/index.md
    - Client setup: mcp/client-setup.md
    - Tool reference: mcp/tools.md
    - Interactive debugger: mcp/debugging.md