name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.1.6)'
        required: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  test-linux:
    name: Test Linux
    needs: lint
    runs-on: ubuntu-latest
    services:
      iris:
        image: intersystemsdc/iris-community:latest
        ports:
          - 52773:52773
          - 1972:1972
        env:
          IRIS_USERNAME: _SYSTEM
          IRIS_PASSWORD: SYS
        options: >-
          --health-cmd "/irisHealth.sh"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 20
          --health-start-period 90s
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        env:
          IRIS_BASE_URL: http://localhost:52773
          IRIS_USERNAME: _SYSTEM
          IRIS_PASSWORD: SYS
        run: uv run pytest tests/integration/ -v --tb=short --continue-on-collection-errors

  test-windows:
    name: Test Windows
    needs: lint
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --tb=short

  build:
    name: Build Release Artifacts
    needs: [test-linux, test-windows]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: prism-linux
          - os: windows-latest
            artifact_name: prism-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build wheel (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: uv build

      - name: Build PyInstaller exe (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          uv pip install pyinstaller
          uv run pyinstaller --onefile --name prism src/prism/cli/app.py

      - name: Build Inno Setup installer (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          # Read version from pyproject.toml
          $pyproject = Get-Content pyproject.toml -Raw
          $version = "0.0.0"
          if ($pyproject -match 'version\s*=\s*"([^"]+)"') {
            $version = $matches[1]
          }
          Write-Host "Building installer for version $version"
          # Rename exe to versioned name (matches .iss Source path)
          Copy-Item dist/prism.exe "dist/prism-$version.exe"
          # Create a CI-compatible .iss that uses relative paths
          $issContent = Get-Content vagrant/prism.iss -Raw
          $issContent = $issContent -replace 'C:\\vagrant\\dist', '.'
          Set-Content dist/prism.iss $issContent
          # Find ISCC.exe
          $iscc = Get-ChildItem "C:\Program Files*\Inno Setup*\ISCC.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $iscc) {
            $iscc = Get-ChildItem "C:\Program Files (x86)\Inno Setup*\ISCC.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $iscc) {
            Write-Error "Inno Setup compiler (ISCC.exe) not found"
            exit 1
          }
          Write-Host "Using ISCC: $($iscc.FullName)"
          & $iscc.FullName "/DAppVer=$version" "dist/prism.iss"
          # Verify installer was created
          $installer = "dist/prism-$version-setup.exe"
          if (Test-Path $installer) {
            $size = [math]::Round((Get-Item $installer).Length / 1MB, 1)
            Write-Host "Installer created: $installer ($size MB)"
          } else {
            Write-Error "Installer not found at $installer"
            exit 1
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.whl
            dist/prism.exe
            dist/prism-*-setup.exe

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Get version and detect prerelease
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          if [[ "$TAG" =~ -[a-zA-Z] ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: |
            artifacts/**/*.whl
            artifacts/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}