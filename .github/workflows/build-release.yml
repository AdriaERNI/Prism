name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.1.6)'
        required: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  test-linux:
    name: Test Linux
    needs: lint
    runs-on: ubuntu-latest
    services:
      iris:
        image: intersystemsdc/iris-community:latest
        ports:
          - 52773:52773
        env:
          IRIS_PASSWORD: SYS
        options: >-
          --health-cmd "iris session IRIS -U %SYS '##class(%SYSTEM.Process).GetOS()' || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 30s
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --tb=short

      - name: Wait for IRIS
        run: |
          AUTH=$(echo -n "_SYSTEM:SYS" | base64)
          for i in {1..60}; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Basic $AUTH" http://localhost:52773/api/atelier/v8/USER)
            if [ "$CODE" = "200" ]; then
              echo "IRIS is ready"
              exit 0
            fi
            echo "Waiting for IRIS... ($i/60) (HTTP $CODE)"
            sleep 5
          done
          echo "IRIS did not start in time"
          exit 1

      - name: Run integration tests
        env:
          IRIS_BASE_URL: http://localhost:52773
          IRIS_USERNAME: _SYSTEM
          IRIS_PASSWORD: SYS
        run: uv run pytest tests/integration/ -v --tb=short

  test-windows:
    name: Test Windows
    needs: lint
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --tb=short

      - name: Start IRIS via Docker
        run: |
          docker run -d --name iris -p 52773:52773 -e IRIS_PASSWORD=SYS intersystemsdc/iris-community:latest
          docker ps

      - name: Wait for IRIS
        run: |
          $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("_SYSTEM:SYS"))
          for ($i = 1; $i -le 60; $i++) {
            try {
              $code = (Invoke-WebRequest -Uri http://localhost:52773/api/atelier/v8/USER -UseBasicParsing -TimeoutSec 5 -Headers @{Authorization="Basic $auth"} -SkipHttpErrorCheck).StatusCode
              if ($code -eq 200) {
                Write-Host "IRIS is ready"
                exit 0
              }
              Write-Host "Waiting for IRIS... ($i/60) (HTTP $code)"
            } catch {
              Write-Host "Waiting for IRIS... ($i/60)"
            }
            Start-Sleep 5
          }
          Write-Error "IRIS did not start in time"
          exit 1

      - name: Run integration tests
        env:
          IRIS_BASE_URL: http://localhost:52773
          IRIS_USERNAME: _SYSTEM
          IRIS_PASSWORD: SYS
        run: uv run pytest tests/integration/ -v --tb=short

  build:
    name: Build Release Artifacts
    needs: [test-linux, test-windows]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: prism-linux
          - os: windows-latest
            artifact_name: prism-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build wheel (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: uv build

      - name: Build PyInstaller exe (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          uv pip install pyinstaller
          uv run pyinstaller --onefile --name prism src/prism/cli/app.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.whl
            dist/prism.exe

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version and detect prerelease
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          if [[ "$TAG" =~ -[a-zA-Z] ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: |
            artifacts/**/*.whl
            artifacts/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}