name: Test Windows

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install PyInstaller and Inno Setup
        run: |
          uv pip install pyinstaller
          choco install innosetup -y

      - name: Build Windows exe
        run: uv run pyinstaller --onefile --name prism src/prism/cli/app.py

      - name: Start IRIS via Docker
        run: |
          docker run -d --name iris -p 52773:52773 intersystemsdc/iris-community:latest
          docker ps

      - name: Wait for IRIS
        run: |
          $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("_SYSTEM:SYS"))
          for ($i = 1; $i -le 60; $i++) {
            try {
              $code = (Invoke-WebRequest -Uri http://localhost:52773/api/atelier/v8/USER -UseBasicParsing -TimeoutSec 5 -Headers @{Authorization="Basic $auth"} -SkipHttpErrorCheck).StatusCode
              if ($code -eq 200) {
                Write-Host "IRIS is ready"
                exit 0
              }
              Write-Host "Waiting for IRIS... ($i/60) (HTTP $code)"
            } catch {
              Write-Host "Waiting for IRIS... ($i/60)"
            }
            Start-Sleep 5
          }
          Write-Error "IRIS did not start in time"
          exit 1

      - name: Run unit tests
        env:
          IRIS_BASE_URL: http://localhost:52773
          IRIS_USERNAME: _SYSTEM
          IRIS_PASSWORD: SYS
        run: uv run pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        env:
          IRIS_BASE_URL: http://localhost:52773
          IRIS_USERNAME: _SYSTEM
          IRIS_PASSWORD: SYS
        run: uv run pytest tests/integration/ -v --tb=short