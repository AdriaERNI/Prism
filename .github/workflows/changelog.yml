name: Changelog

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy changelog to docs
        run: |
          # Prepend the generated changelog to docs/changelog.md
          # keeping the auto-generated notice at the top
          {
            echo "<!-- This file is auto-generated by git-cliff via GitHub Actions. Do not edit manually. -->"
            echo ""
            cat CHANGELOG.md
          } > docs/changelog.md

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md docs/changelog.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(release): update changelog for ${{ github.ref_name }}"
            git push origin HEAD:main
          fi

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: |
            CHANGELOG.md
            docs/changelog.md