name: Changelog

on:
  push:
    branches: [development]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --strip header
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy changelog to docs
        run: |
          {
            echo "<!-- This file is auto-generated by git-cliff via GitHub Actions. Do not edit manually. -->"
            echo ""
            cat CHANGELOG.md
          } > docs/changelog.md

      - name: Create pull request for changelog
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update changelog"
          title: "chore: update changelog"
          body: |
            Auto-generated changelog update from git-cliff.

            This PR keeps `CHANGELOG.md` and `docs/changelog.md` in sync with
            the latest conventional commits. Merging this PR will update the
            MkDocs site on the next deploy.
          branch: chore/changelog
          base: development
          add-paths: |
            CHANGELOG.md
            docs/changelog.md
          labels: |
            dependencies
            automated

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: |
            CHANGELOG.md
            docs/changelog.md