name: Bug Report
description: Report a bug in Prism
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Steps to reproduce
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux
        - Windows
        - macOS
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Prism Version
      placeholder: "0.1.5"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      render: shell
