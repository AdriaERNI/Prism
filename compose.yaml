services:
  iris:
    image: docker.io/intersystemsdc/iris-community:latest
    ports:
      - "52773:52773"
    command: --check-caps false
    environment:
      - IRIS_PASSWORD=SYS
    healthcheck:
      test: ["CMD-SHELL", "iris session IRIS -U %SYS '##class(%SYSTEM.Process).GetOS()' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
