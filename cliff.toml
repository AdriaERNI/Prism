# git-cliff ~ configuration file
# https://git-cliff.org/docs/configuration

# ── GitHub remote (for commit/PR/compare links) ──────────────────────────
[remote.github]
owner = "AdriaERNI"
repo = "Prism"

# ── Changelog template ─────────────────────────────────────────────────────
[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Conventional Commits](https://www.conventionalcommits.org/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

<!-- This file is auto-generated by git-cliff. Do not edit manually. -->
"""
body = """
{% if version %}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}
    ## [Unreleased]
{% endif %}

{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}\
          {% if commit.breaking %} (**BREAKING**){% endif %}\
          ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/AdriaERNI/Prism/commit/{{ commit.id }}))
    {% endfor %}

{% endfor %}
"""
trim = true
footer = """
<!-- generated by git-cliff -->
"""

# ── Git parsing rules ──────────────────────────────────────────────────────
[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
# When generating a stable release (e.g. v0.2.0), pre-release tags are
# ignored as section breaks so all beta commits roll up into the stable
# release notes. Pre-release tags still get their own notes when pushed.
# The workflow passes --ignore-tags for stable releases only.
commit_preprocessors = [
  { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](https://github.com/AdriaERNI/Prism/issues/${2}))" },
]
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^doc", group = "Documentation" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^style", group = "Styling" },
  { message = "^test", group = "Testing" },
  { message = "^build", group = "Build System" },
  { message = "^ci", group = "CI/CD" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(deps\\)", group = "Dependencies" },
  { message = "^chore", group = "Miscellaneous" },
  { message = "^revert", group = "Reverted" },
]
protect_breaking_commits = true
filter_commits = false
topo_order = false
sort_commits = "newest"