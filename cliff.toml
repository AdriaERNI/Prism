# git-cliff ~ configuration file
# https://git-cliff.org/docs/configuration
#
# Generates CHANGELOG.md and docs/changelog.md from Conventional Commits.
# Used by the `changelog.yml` GitHub Actions workflow on release tags.

# ── GitHub remote (for commit/PR/compare links) ──────────────────────────
[remote.github]
owner = "AdriaERNI"
repo = "Prism"

# ── Changelog template ─────────────────────────────────────────────────────
[changelog]
# Rendered once at the top of the file.
header = """\
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Conventional Commits](https://www.conventionalcommits.org/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

<!-- This file is auto-generated by git-cliff. Do not edit manually. -->
<!-- Run `git-cliff --output CHANGELOG.md` or the changelog.yml workflow to update. -->
"""

# Rendered for each release (tag) and for the unreleased section.
body = """\
{%- macro remote_url() -%}
  https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}

{% macro print_commit(commit) -%}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
  {% if commit.breaking %}[**breaking**] {% endif %}\
  {{ commit.message | upper_first }}\
  ([{{ commit.id | truncate(length=7, end="") }}]({{ self::remote_url() }}/commit/{{ commit.id }}))
{% endmacro %}

{% if version %}
    {% if previous.version %}
        ## [{{ version | trim_start_matches(pat="v") }]\
        ({{ self::remote_url() }}/compare/{{ previous.version }}...{{ version }}) - {{ timestamp | date(format="%Y-%m-%d") }}
    {% else %}
        ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
    {% endif %}
{% else %}
    ## [Unreleased]({{ self::remote_url() }}/compare/{{ previous.version }}...HEAD)
{% endif %}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}

{% for commit in commits %}
{{ self::print_commit(commit=commit) }}
{% endfor %}
{% endfor %}
"""

# Remove leading/trailing whitespace from the body.
trim = true

# Rendered once at the bottom of the file.
footer = """\
<!-- generated by git-cliff -->
"""

# Post-process the rendered output to substitute <REPO> placeholders.
postprocessors = [
  { pattern = '<REPO>', replace = "https://github.com/AdriaERNI/Prism" },
]

# ── Git parsing rules ──────────────────────────────────────────────────────
[git]
# Parse commits according to the conventional commits specification.
conventional_commits = true

# Exclude commits that do not match conventional commits.
filter_unconventional = false

# Split commits on newlines (useful for squashed merges).
split_commits = false

# Pre-process commit messages before grouping.
commit_preprocessors = [
  # Replace issue numbers (e.g. #123) with clickable links.
  { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](<REPO>/issues/${2}))" },
  # Replace PR references in merge commits (e.g. (#123)).
  { pattern = 'Merge pull request #([0-9]+)', replace = "PR [#${1}](<REPO>/pull/${1})" },
]

# Group commits by conventional-commit type.
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^doc", group = "Documentation" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^style", group = "Styling" },
  { message = "^test", group = "Testing" },
  { message = "^build", group = "Build System" },
  { message = "^ci", group = "CI/CD" },
  # Skip pure release commits (e.g. "chore(release): prepare v0.1.5").
  { message = "^chore\\(release\\)", skip = true },
  # Group dependency bumps separately.
  { message = "^chore\\(deps\\)", group = "Dependencies" },
  { message = "^chore|^revert", group = "Miscellaneous" },
]

# Don't let breaking commits be filtered out by skip rules.
protect_breaking_commits = true

# Exclude commits not matched by any parser.
filter_commits = false

# Select git tags that represent releases.
# Matches both legacy tags (0.1.3) and new v-prefixed tags (v0.1.5).
tag_pattern = "v?[0-9]+\\.[0-9]+\\.[0-9]+"

# Regex for tags to skip entirely (not shown in changelog, rolled into next release).
skip_tags = "beta|alpha|rc"

# Regex for tags to ignore (excluded from output, NOT rolled into next release).
ignore_tags = ""

# Order releases topologically instead of chronologically.
topo_order = false

# Order of commits within each group: newest or oldest.
sort_commits = "newest"